<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Final</title>

  <!-- Referencia a CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Encabezado -->
  <header class="encabezado">

    <!-- Lado izquierdo: logo + menú -->
    <section class="lado izquierdo">

      <!-- Logo -->
      <a href="index.html" class="logo">
        <img src="https://static.vecteezy.com/system/resources/previews/022/636/379/non_2x/starbucks-logo-starbucks-icon-transparent-free-png.png" alt="logo">
      </a>

      <!-- Menú de navegación -->
      <nav class="nav">
        <a href="index.html">Menú</a>
        <a href="rewards.html">Rewards</a>
        <a href="#">Tiendas</a>
      </nav>

    </section>

    <!-- Lado derecho: botones -->
    <section class="lado derecho">
      <a href="#" class="claro">Ingresar</a>
      <a href="#" class="oscuro">Únete</a>
    </section>

  </header>

  <!-- Barra verde fija -->
  <section class="barra">
    <h1>Starbucks Rewards</h1>
    <a href="rewards.html" class="borde-blanco">Conoce más</a>
  </section>

  <main>

    <!-- Sección de promoción -->

      <!-- Texto -->
      <section class="txt">
        <h2>¡Hola PROteína!</h2>
        <p>Bebidas con proteína.</p>
        <a href="#" class="btn borde">Descubre más</a>
      </section>

      <!-- Imagen -->
      <section class="img">
        <img src="https://lbal-starbucks-prod-files-default.s3.amazonaws.com/s3fs-public/2026-03/POST_LAUNCH_PROTEINA_MEXICO_MatchaProteinLatte%20(2)%20(1).png" alt="bebida starbucks">
      </section>

    </section>

  </main>

  <!-- Footer -->
  <footer class="pie">

    <!-- Columnas -->
    <section class="cols">

      <!-- Columna 1 -->
      <section class="col">
        <h3>Nosotros</h3>
        <a href="#">Historia</a>
      </section>

      <!-- Columna 2 -->
      <section class="col">
        <h3>Ayuda</h3>
        <a href="#">Contacto</a>
      </section>

    </section>

  </footer>

</body>
</html>
